name: Build iOS App

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # 🔥 Inject your web app into iOS bundle
      - name: Copy web assets
        run: |
          mkdir -p ios-template/YourApp/web
          cp -r web/* ios-template/YourApp/web/

      # 🔐 Create API key file from secret
      - name: Create API key file
        run: |
          mkdir -p private_keys
          printf "%s" "$APPSTORE_API_KEY" > private_keys/AuthKey.p8
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}

      # 🔧 Build the app (authenticated)
    - name: Archive app
      run: |
        xcodebuild \
          -project ios-template/YourApp.xcodeproj \
          -scheme YourApp \
          -sdk iphoneos \
          -configuration Release \
          -allowProvisioningUpdates \
          -authenticationKeyPath $PWD/private_keys/AuthKey.p8 \
          -authenticationKeyID $APPSTORE_KEY_ID \
          -authenticationKeyIssuerID $APPSTORE_ISSUER_ID \
          DEVELOPMENT_TEAM=53Q5DF4NQ3 \
          -archivePath $PWD/build/YourApp.xcarchive \
          archive
      env:
        APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
